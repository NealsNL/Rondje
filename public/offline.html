<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Geen internet — Routeplanner</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: #1a2233;
        background: #f8fafc;
        padding: 24px;
      }
      .box {
        max-width: 360px;
        text-align: center;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #ea580c;
        display: inline-block;
        margin-bottom: 12px;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.6;
        color: #64748b;
        margin: 0 0 16px;
      }
      button {
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #16a34a;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span class="dot"></span>
      <h1>Geen internet</h1>
      <p>
        De routeplanner heeft internet nodig voor de kaart en het uitrekenen van
        routes. Controleer je verbinding en probeer het opnieuw.
      </p>
      <button onclick="location.reload()">Opnieuw proberen</button>
    </div>
  </body>
</html>
